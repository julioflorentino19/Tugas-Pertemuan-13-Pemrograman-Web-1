<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Functions</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../script.js"></script>
</head>
<body>
  <h2>Functions</h2>
  <button onclick="halo()">Fungsi tanpa parameter</button>
  <p id="hasilHalo"></p>

  <input type="text" id="nama" placeholder="Masukkan nama">
  <button onclick="sapa()">Fungsi dengan parameter</button>
  <p id="hasilSapa"></p>

  <input type="number" id="a" placeholder="Angka 1">
  <input type="number" id="b" placeholder="Angka 2">
  <button onclick="tambah()">Fungsi dengan return value</button>
  <p id="hasilTambah"></p>
</body>
</html>
